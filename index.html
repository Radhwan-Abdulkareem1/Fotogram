<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotogram</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./css/dialog.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header class="header">
        <a href="./index.html" aria-label="Fotogram - Go to homepage" class="logo">
            <img src="./img/icons/logo.png" alt="Logo-img" class="logo-img icon-size">
            <span class="logo-headline font-color">Fotogram</span>
        </a>
        <nav>
            <ul class="header-nav">
                <li>
                    <a href="./index.html" aria-label="Whatsapp (derzeit nicht verfügbar)">
                        <img src="./img/icons/whatsapp-logo.svg" alt="" class="header-right-links icon-size">
                    </a>
                </li>
                <li class="div-seperator"></li>
                <li>
                    <a href="mailto:contact.radhwan@gmail.com" rel="noopener"
                        aria-label="E-Mail an contact.radhwan@gmail.com senden">
                        <img src="./img/icons/email_icon.svg" alt="" class="header-right-links icon-size">
                    </a>
                </li>
                <li class="div-seperator"></li>
                <li>
                    <a href="./index.html" aria-label="Login (derzeit nicht vorhanden)">
                        <img src="./img/icons/login.svg" alt="" class="header-right-links icon-size">
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <main class="main-padding">
        <article class="main-section">
            <h1 class="headline font-color figtree-uniquifier">Ein paar Lieblingsbilder von mir</h1>
            <section id="imgs" class="main-imgs"></section>
        </article>
        <dialog id="dialog" class="dialog">
            <header class="dialog-header">
                <h1 id="pictureheadline" class="figtree-uniquifier"></h1>
                <button id="closeButton" class="dialog-close-button figtree-uniquifier">
                    &times;
                </button>
            </header>
            <main>
                <figure>
                    <img alt="" id="dialogImage" class="dialog-opened-image">
                    <figcaption id="imageCaption" class="dialog-figcaption figtree-uniquifier"></figcaption>
                </figure>
                <footer class="next-previous-section font-color">
                    <button onclick="previousImage()" class="change-precious-button" aria-label="Vorheriges Bild anzeigen">
                        <img src="./img/icons/Union-left.svg" alt="">
                    </button>
                    <h4 id="imagePosition" class="figtree-uniquifier"></h4>
                    <button onclick="nextImage()" class="change-precious-button" aria-label="Nächstes Bild anzeigen">
                        <img src="./img/icons/Union-right.svg" alt="">
                    </button>
                </footer>
            </main>
        </dialog>
    </main>
    
    <footer class="footer">
        <section class="footer-section">
            <a href="./index.html" aria-label="Fotogram Logo -Go to homepage">
                <img src="./img/icons/logo.png" alt="" class="logo-icon icon-size">
            </a>
            <h5 class="figtree-uniquifier">created by Radhwan Abdulkareem 2026</h5>
        </section>
        <article class="footer-seperator">
            <section class="footer-section figtree-uniquifier">
                <a href="#" class="footer-center-links">Impressum</a>
                <div class="div-seperator"></div>
                <a href="#" class="footer-center-links">Datenschutz</a>
            </section>
            <section class="footer-right">
                <a href="https://discord.com/users/radhwan1" target="_blank" rel="noopener"
                    aria-label="Discord Profil von radhwan1 öffnen (öffnet in neuem Tab)">
                    <img src="./img/icons/discord_icon.svg" alt="" class="footer-contact-apps icon-size">
                </a>
                <div class="div-seperator"></div>
                <a href="https://www.instagram.com/razwanofficial/" target="_blank" rel="noopener"
                    aria-label="instagram Profil von razwanofficial öffnen (öffnet in neuem Tab)">
                    <img src="./img/icons/instagram.svg" alt="" class="footer-contact-apps icon-size">
                </a>
                <div class="div-seperator"></div>
                <a href="./index.html" aria-label="Whatsapp (derzeit nicht verfügbar)">
                    <img src="./img/icons/whatsapp-logo.svg" alt="" class="footer-contact-apps icon-size">
                </a>
            </section>
        </article>
    </footer>
</body>
<script src="script.js"></script>

</html>
